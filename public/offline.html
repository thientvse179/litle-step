<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nhà Nhỏ — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #fef7f0;
      color: #1c1917;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 320px;
    }
    .emoji { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    p { color: #57534e; font-size: 0.875rem; line-height: 1.5; }
    button {
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      background: #f97316;
      color: white;
      border: none;
      border-radius: 0.875rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">📡</div>
    <h1>Không có kết nối mạng</h1>
    <p>Nhà Nhỏ cần Internet để tải nội dung. Hãy kiểm tra kết nối và thử lại nhé!</p>
    <button onclick="location.reload()">Thử lại</button>
  </div>
</body>
</html>
